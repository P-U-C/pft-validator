<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <!-- Paper background -->
  <rect width="600" height="400" fill="#f4e8cd"/>
  <rect width="600" height="400" fill="url(#grain)" opacity="0.03"/>

  <!-- Top bar -->
  <line x1="30" y1="35" x2="570" y2="35" stroke="#a08c6a" stroke-width="0.5"/>
  <text x="30" y="30" font-family="Georgia, serif" font-size="7" fill="#6b5a42" letter-spacing="0.5" text-transform="uppercase">BY THE SWARM, FOR THE SWARM</text>
  <text x="570" y="30" font-family="Georgia, serif" font-size="7" fill="#6b5a42" text-anchor="end" font-style="italic">Morning Edition</text>

  <!-- Masthead -->
  <text x="300" y="48" font-family="Georgia, serif" font-size="6" fill="#6b5a42" text-anchor="middle" letter-spacing="8">&#x2726; &#x2726; &#x2726;</text>
  <text x="300" y="85" font-family="Georgia, serif" font-size="42" fill="#1a1209" text-anchor="middle" font-weight="bold" letter-spacing="2">The Hive Herald</text>
  <text x="300" y="100" font-family="Georgia, serif" font-size="8" fill="#6b5a42" text-anchor="middle" letter-spacing="4" text-transform="uppercase">DISPATCHES FROM THE POST FIAT COLONY</text>
  <line x1="30" y1="110" x2="570" y2="110" stroke="#2a1f0e" stroke-width="2"/>
  <line x1="30" y1="114" x2="570" y2="114" stroke="#2a1f0e" stroke-width="0.5"/>

  <!-- Date bar -->

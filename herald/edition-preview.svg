  <text x="570" y="128" font-family="Georgia, serif" font-size="8" fill="#6b5a42" text-anchor="end" font-style="italic">Powered by Lens</text>
  <line x1="30" y1="135" x2="570" y2="135" stroke="#2a1f0e" stroke-width="1.5"/>

  <!-- Headline -->
  <text x="300" y="170" font-family="Georgia, serif" font-size="28" fill="#1a1209" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">41 CONTRIBUTORS</text>
  <text x="300" y="200" font-family="Georgia, serif" font-size="28" fill="#1a1209" text-anchor="middle" font-weight="bold" letter-spacing="-0.5">DRIVE THE COLONY</text>

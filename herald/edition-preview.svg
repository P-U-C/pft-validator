  <!-- Three column headers -->
  <line x1="30" y1="240" x2="570" y2="240" stroke="#2a1f0e" stroke-width="1.5"/>

  <text x="120" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1209" text-anchor="middle" font-weight="bold">Flow of Capital</text>
  <text x="120" y="275" font-family="Georgia, serif" font-size="9" fill="#6b5a42" text-anchor="middle" letter-spacing="1.5">TREASURY DESK</text>
  <text x="120" y="295" font-family="Georgia, serif" font-size="10" fill="#3a2a15" text-anchor="middle">44 reward payments</text>
  <text x="120" y="310" font-family="Georgia, serif" font-size="10" fill="#3a2a15" text-anchor="middle">298K PFT to 23 contributors</text>

  <!-- Column divider -->
  <line x1="210" y1="245" x2="210" y2="380" stroke="#a08c6a" stroke-width="0.5"/>

  <text x="310" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1209" text-anchor="middle" font-weight="bold">Who Stirs the Hive</text>
  <text x="310" y="275" font-family="Georgia, serif" font-size="9" fill="#6b5a42" text-anchor="middle" letter-spacing="1.5">MOVEMENT DESK</text>
  <text x="310" y="295" font-family="Georgia, serif" font-size="10" fill="#3a2a15" text-anchor="middle">5 new wallets this week</text>
  <text x="310" y="310" font-family="Georgia, serif" font-size="10" fill="#3a2a15" text-anchor="middle">Top: 147 dispatches in 7 days</text>

  <!-- Column divider -->
  <line x1="400" y1="245" x2="400" y2="380" stroke="#a08c6a" stroke-width="0.5"/>

  <text x="490" y="258" font-family="Georgia, serif" font-size="14" fill="#1a1209" text-anchor="middle" font-weight="bold">Sybil Watch</text>
  <text x="490" y="275" font-family="Georgia, serif" font-size="9" fill="#6b5a42" text-anchor="middle" letter-spacing="1.5">SECURITY DESK</text>
  <text x="490" y="295" font-family="Georgia, serif" font-size="10" fill="#3a2a15" text-anchor="middle">Bot ratio: 60.3%</text>
  <text x="490" y="310" font-family="Georgia, serif" font-size="10" fill="#3a2a15" text-anchor="middle">Enforcement: active</text>
  <text x="490" y="325" font-family="Georgia, serif" font-size="10" fill="#3a2a15" text-anchor="middle">Zero reward leaks</text>

  <!-- Footer -->
  <line x1="30" y1="370" x2="570" y2="370" stroke="#2a1f0e" stroke-width="1"/>
  <line x1="30" y1="373" x2="570" y2="373" stroke="#2a1f0e" stroke-width="0.5"/>
  <text x="300" y="390" font-family="Georgia, serif" font-size="7" fill="#6b5a42" text-anchor="middle" letter-spacing="2">THE HIVE HERALD © MMXXVI — PERMANENT UPPER CLASS</text>

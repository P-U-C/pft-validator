  <!-- PUC brand -->
  <text x="80" y="110" font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="11" font-weight="500" fill="rgba(219,184,92,0.5)" letter-spacing="6">PERMANENT UPPER CLASS</text>

  <!-- Validator label -->

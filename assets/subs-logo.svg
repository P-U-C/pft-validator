<svg width="100%" viewBox="0 0 680 690" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">PFT SUBS logo — corrected S orientation</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">SUBS subscription protocol logo — proper S with dot input and three dot outputs</desc>
<rect width="680" height="680" fill="#000000" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Input dot -->
<circle cx="345" cy="190" r="5" fill="#5EEA96" style="fill:rgb(94, 234, 150);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- The S — proper orientation: top curves left, bottom curves right -->
<path d="M345,190 C265,190 220,210 220,255 C220,300 310,310 310,310 C310,310 400,320 400,365 C400,410 355,430 275,430" fill="none" stroke="#5EEA96" stroke-width="6" stroke-linecap="round" style="fill:none;stroke:rgb(94, 234, 150);color:rgb(0, 0, 0);stroke-width:6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Output fan from bottom-left terminal -->
<path d="M275,430 L225,405" fill="none" stroke="#5EEA96" stroke-width="5" stroke-linecap="round" style="fill:none;stroke:rgb(94, 234, 150);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M275,430 L220,430" fill="none" stroke="#5EEA96" stroke-width="5" stroke-linecap="round" style="fill:none;stroke:rgb(94, 234, 150);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<path d="M275,430 L225,455" fill="none" stroke="#5EEA96" stroke-width="5" stroke-linecap="round" style="fill:none;stroke:rgb(94, 234, 150);color:rgb(0, 0, 0);stroke-width:5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Output dots -->
<circle cx="225" cy="405" r="3.5" fill="#5EEA96" style="fill:rgb(94, 234, 150);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="220" cy="430" r="3.5" fill="#5EEA96" style="fill:rgb(94, 234, 150);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<circle cx="225" cy="455" r="3.5" fill="#5EEA96" style="fill:rgb(94, 234, 150);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- SUBS wordmark -->
<text x="310" y="540" text-anchor="middle" dominant-baseline="central" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="32" fill="#5EEA96" letter-spacing="12" font-weight="500" style="fill:rgb(94, 234, 150);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;SF Mono&quot;, &quot;Fira Code&quot;, &quot;Courier New&quot;, monospace;font-size:32px;font-weight:500;text-anchor:middle;dominant-baseline:central">SUBS</text>
<text x="310" y="576" text-anchor="middle" dominant-baseline="central" font-family="'SF Mono','Fira Code','Courier New',monospace" font-size="10" fill="#5EEA96" opacity="0.4" letter-spacing="5" style="fill:rgb(94, 234, 150);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;SF Mono&quot;, &quot;Fira Code&quot;, &quot;Courier New&quot;, monospace;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:central">SUBSCRIPTION PROTOCOL</text>
</svg>